name: Deploy Supabase Database

on:
  push:
    branches:
      - master
    paths:
      - "backend/supabase/migrations/**"
      - "backend/supabase/tests/**"
      - "backend/supabase/manual/run_phase1_target_verification.ps1"
      - "backend/supabase/manual/reset_vocabulary_content_for_rebuild.sql"
      - "backend/content-pipeline/constructed_data/band_4_0_v1/supabase_import/**"
      - ".github/workflows/supabase-db.yml"
  workflow_dispatch:
    inputs:
      content_action:
        description: "Content table action after migrations"
        required: true
        default: "none"
        type: choice
        options:
          - "none"
          - "load_table"
          - "update_table"

concurrency:
  group: supabase-db-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-migrations:
    name: Deploy migrations
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name != 'workflow_dispatch' || inputs.content_action == 'none'

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Prepare Supabase CLI project
        run: |
          if [ ! -f backend/supabase/config.toml ]; then
            supabase --workdir backend/supabase init
          fi

      - name: Link Supabase project
        run: supabase --workdir backend/supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push database migrations
        run: supabase --workdir backend/supabase db push

  content-tables:
    name: Content tables
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-migrations
    if: always() && github.event_name == 'workflow_dispatch' && inputs.content_action != 'none'

    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify target DB has migrated schema
        shell: bash
        run: |
          docker run --rm postgres:17-alpine \
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "
              with existing_public_tables as (
                select coalesce(string_agg(tablename, ', ' order by tablename), '<none>') as names
                from pg_tables
                where schemaname = 'public'
              ),
              migration_versions as (
                select case
                  when to_regclass('supabase_migrations.schema_migrations') is null then '<schema_migrations table missing>'
                  else '<schema_migrations table exists; detailed versions checked below>'
                end as versions
              )
              select
                current_database() as database_name,
                current_user as database_user,
                inet_server_addr() as server_addr,
                inet_server_port() as server_port,
                (select names from existing_public_tables) as existing_public_tables,
                (select versions from migration_versions) as recorded_migrations,
                to_regclass('public.content_sources') as content_sources_table;

              do \$\$
              declare
                existing_public_tables text;
                recorded_migrations text;
              begin
                select coalesce(string_agg(tablename, ', ' order by tablename), '<none>')
                into existing_public_tables
                from pg_tables
                where schemaname = 'public';

                if to_regclass('supabase_migrations.schema_migrations') is null then
                  recorded_migrations := '<schema_migrations table missing>';
                else
                  execute 'select coalesce(string_agg(version, '', '' order by version), ''<no migrations recorded>'') from supabase_migrations.schema_migrations'
                  into recorded_migrations;
                end if;

                if to_regclass('public.content_sources') is null then
                  raise exception 'Missing public.content_sources in DATABASE_URL target. Existing public tables: %. Recorded migrations: %. Check that SUPABASE_PROJECT_ID and SUPABASE_DATABASE_URL point to the same Supabase project, then run migrations before importing content.',
                    existing_public_tables,
                    recorded_migrations;
                end if;
              end
              \$\$;"

      - name: Load tables from clean Band 4 CSV package
        if: inputs.content_action == 'load_table'
        shell: pwsh
        run: |
          ./backend/supabase/manual/run_phase1_target_verification.ps1 `
            -ResetVocabulary `
            -ImportBand4 `
            -UseDocker

      - name: Update tables from Band 4 CSV package
        if: inputs.content_action == 'update_table'
        shell: pwsh
        run: |
          ./backend/supabase/manual/run_phase1_target_verification.ps1 `
            -UpsertBand4 `
            -UseDocker
